apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-backend
  labels:
    app: property-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: property-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: property-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: property-backend
          image: property-backend:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: property-backend-config
            - secretRef:
                name: property-backend-secret
          env:
            - name: JAVA_OPTS
              value: >-
                -XX:+UseG1GC
                -XX:MaxRAMPercentage=75.0
                -XX:+UseStringDeduplication
                -Dspring.profiles.active=prod
                -Duser.timezone=Asia/Shanghai
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
      terminationGracePeriodSeconds: 30
