# 模板文件 — 实际部署时替换为真实值（base64 编码）或使用 sealed-secrets
apiVersion: v1
kind: Secret
metadata:
  name: property-backend-secret
type: Opaque
stringData:
  DB_URL: "jdbc:mysql://rds-host:3306/property_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true"
  DB_USERNAME: "app_user"
  DB_PASSWORD: "CHANGE_ME"
  REDIS_HOST: "redis-host"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  RABBIT_HOST: "rabbitmq-host"
  RABBIT_PORT: "5672"
  RABBIT_USER: "app_user"
  RABBIT_PASS: "CHANGE_ME"
  XXL_JOB_ADMIN_URL: "http://xxl-job-admin:8080/xxl-job-admin"
  XXL_JOB_ACCESS_TOKEN: "CHANGE_ME"
