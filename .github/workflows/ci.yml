name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: mvn verify
        run: mvn verify -B --no-transfer-progress

  docker:
    name: Docker Build
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package (skip tests)
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Build Docker image
        run: |
          docker build \
            --tag property-backend:${{ github.sha }} \
            --tag property-backend:latest \
            .
